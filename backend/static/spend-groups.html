<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basket · Spend Groups</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script>
    (function() {
      var t = localStorage.getItem('basket-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        /* ── Dark (default) ── */
    :root, [data-theme="dark"] {
      --bg:         #0d0f11;
      --surface:    #141618;
      --surface2:   #1c1f22;
      --surface3:   #22262b;
      --border:     #2a2d32;
      --border2:    #3d4249;
      --text:       #e2e4e7;
      --text-dim:   #9ca3af;
      --text-muted: #6b7280;
      --accent:     #f97316;
      --accent-dim: #7c3a10;
      --green:      #22c55e;
      --yellow:     #eab308;
      --red:        #ef4444;
      --purple:     #a78bfa;
      --purple-dim: #3b2a6e;
      --teal:       #2dd4bf;
      --teal-dim:   #134e4a;
      --blue:       #60a5fa;
      --green-dim:  #14532d;
      --mono:       'Space Mono', monospace;
      --sans:       'DM Sans', sans-serif;
    }

    /* ── Light ── */
    [data-theme="light"] {
      --bg:         #f3f4f6;
      --surface:    #ffffff;
      --surface2:   #f0f2f4;
      --surface3:   #e5e7eb;
      --border:     #d1d5db;
      --border2:    #bbc0c8;
      --text:       #111827;
      --text-dim:   #374151;
      --text-muted: #6b7280;
      --accent:     #c2550d;
      --accent-dim: #fff0e6;
      --green:      #15803d;
      --yellow:     #92700a;
      --red:        #b91c1c;
      --purple:     #6d28d9;
      --purple-dim: #ede9fe;
      --teal:       #0f766e;
      --teal-dim:   #ccfbf1;
      --blue:       #1d4ed8;
      --green-dim:  #dcfce7;
      --mono:       'Space Mono', monospace;
      --sans:       'DM Sans', sans-serif;
    }

    /* ── High contrast ── */
    [data-theme="hc"] {
      --bg:         #000000;
      --surface:    #0a0a0a;
      --surface2:   #141414;
      --surface3:   #1e1e1e;
      --border:     #6b6b6b;
      --border2:    #999999;
      --text:       #ffffff;
      --text-dim:   #e0e0e0;
      --text-muted: #b0b0b0;
      --accent:     #ffaa00;
      --accent-dim: #3a2700;
      --green:      #00e676;
      --yellow:     #ffee58;
      --red:        #ff5252;
      --purple:     #d0bcff;
      --purple-dim: #1a1030;
      --teal:       #64ffda;
      --teal-dim:   #003d33;
      --blue:       #82b1ff;
      --green-dim:  #003300;
      --mono:       'Space Mono', monospace;
      --sans:       'DM Sans', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); transition: background .2s, color .2s; overflow: hidden; }

    header {
      display: flex; align-items: center;
      border-bottom: 1px solid var(--border); background: var(--surface);
      height: 52px; flex-shrink: 0; padding: 0 24px;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; margin-right: 28px; text-decoration: none; color: var(--text); }
    .logo-mark { width: 26px; height: 26px; border: 1.5px solid var(--accent); display: grid; place-items: center; }
    .logo-mark svg { width: 13px; height: 13px; fill: var(--accent); }
    nav { display: flex; gap: 2px; }
    .nav-link { padding: 6px 14px; font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; text-decoration: none; color: var(--text-dim); border-radius: 2px; transition: color .15s, background .15s; }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }

    .workspace { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 52px); overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-head { padding: 12px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .sidebar-title { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .btn-new-group {
      width: 100%; padding: 8px; background: var(--accent); color: #000;
      font-family: var(--mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase;
      border: none; cursor: pointer; border-radius: 2px;
    }
    .btn-new-group:hover { opacity: .85; }
    .sidebar-body { flex: 1; overflow-y: auto; }
    .sidebar-body::-webkit-scrollbar { width: 3px; }
    .sidebar-body::-webkit-scrollbar-thumb { background: var(--border2); }

    .group-card {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .12s; display: flex; align-items: center; gap: 10px;
    }
    .group-card:hover { background: var(--surface2); }
    .group-card.active { background: color-mix(in srgb, var(--accent) 8%, transparent); border-left: 2px solid var(--accent); }
    .group-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .group-info { flex: 1; min-width: 0; }
    .group-name { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 2px; }
    .group-personal { font-family: var(--mono); font-size: 9px; color: var(--text-muted); padding: 1px 5px; border: 1px solid var(--border2); border-radius: 2px; }

    /* ── Main panel ── */
    .main-panel { display: flex; flex-direction: column; overflow: hidden; }

    /* tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .tab { padding: 10px 18px; font-family: var(--mono); font-size: 11px; letter-spacing: .05em; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; transition: color .15s; }
    .tab.active { color: var(--accent); border-color: var(--accent); }
    .tab:hover { color: var(--text); }

    .panel-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border2); }

    /* empty state */
    .empty-state { height: 100%; display: flex; align-items: center; justify-content: center; }
    .empty-inner { text-align: center; font-family: var(--mono); font-size: 11px; color: var(--text-muted); line-height: 2.2; }

    /* section heading */
    .section-title { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }

    /* group header */
    .group-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .group-color-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
    .group-header-name { font-size: 20px; font-weight: 600; flex: 1; }
    .btn-edit-group {
      padding: 5px 12px; font-family: var(--mono); font-size: 10px;
      background: transparent; border: 1px solid var(--border); color: var(--text-dim);
      cursor: pointer; border-radius: 2px;
    }
    .btn-edit-group:hover { border-color: var(--accent); color: var(--accent); }
    .btn-del-group {
      padding: 5px 12px; font-family: var(--mono); font-size: 10px;
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
      cursor: pointer; border-radius: 2px;
    }
    .btn-del-group:hover { border-color: var(--red); color: var(--red); }

    /* stat cards */
    .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 14px 16px; }
    .stat-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .stat-val { font-family: var(--mono); font-size: 20px; color: var(--text); }
    .stat-val.accent { color: var(--accent); }

    /* balance table */
    .balance-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    .balance-table th { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .balance-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .balance-table tr:last-child td { border-bottom: none; }
    .balance-bar-wrap { height: 4px; background: var(--surface3); border-radius: 2px; margin-top: 4px; width: 120px; }
    .balance-bar { height: 4px; border-radius: 2px; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }

    /* settlement box */
    .settlement-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 16px; margin-bottom: 24px; }
    .settlement-title { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 12px; }
    .settlement-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .settlement-row:last-child { border-bottom: none; }
    .settlement-amt { font-family: var(--mono); font-size: 13px; color: var(--accent); margin-left: auto; }
    .all-settled { font-family: var(--mono); font-size: 11px; color: var(--green); text-align: center; padding: 12px; }

    /* members tab */
    .member-row { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid var(--border); }
    .member-row:last-child { border-bottom: none; }
    .member-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--surface3); border: 1px solid var(--border2); display: grid; place-items: center; font-family: var(--mono); font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
    .member-name { flex: 1; font-size: 13px; font-weight: 500; }
    .member-sub { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
    .owner-badge { font-family: var(--mono); font-size: 9px; padding: 2px 6px; border: 1px solid var(--border2); color: var(--accent); border-radius: 2px; }
    .btn-remove-member {
      padding: 4px 10px; font-family: var(--mono); font-size: 10px;
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
      cursor: pointer; border-radius: 2px;
    }
    .btn-remove-member:hover { border-color: var(--red); color: var(--red); }
    .add-member-form { display: flex; gap: 8px; margin-top: 16px; }
    .add-member-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      font-family: var(--sans); font-size: 13px; padding: 7px 10px; border-radius: 2px;
    }
    .add-member-input:focus { outline: none; border-color: var(--accent); }
    .btn-add-member {
      padding: 7px 16px; font-family: var(--mono); font-size: 10px; letter-spacing: .05em;
      background: var(--accent); color: #000; border: none; cursor: pointer; border-radius: 2px;
    }
    .btn-add-member:hover { opacity: .85; }

    /* fields */
    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .field label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }
    .field input, .field select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 13px; padding: 7px 10px; border-radius: 2px; width: 100%; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
    .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .12s, transform .12s; }
    .swatch.selected, .swatch:hover { border-color: var(--text); transform: scale(1.15); }
    .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .toggle-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
    input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

    /* modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 24px 28px; width: 380px; max-width: 95%; }
    .modal-title { font-family: var(--mono); font-size: 12px; margin-bottom: 18px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .btn-primary { padding: 8px 20px; background: var(--accent); color: #000; font-family: var(--mono); font-size: 11px; border: none; cursor: pointer; border-radius: 2px; }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary { padding: 8px 16px; background: transparent; color: var(--text-dim); font-family: var(--mono); font-size: 11px; border: 1px solid var(--border); cursor: pointer; border-radius: 2px; }
    .btn-secondary:hover { border-color: var(--border2); color: var(--text); }
    .btn-danger { padding: 8px 16px; background: transparent; color: var(--red); font-family: var(--mono); font-size: 11px; border: 1px solid var(--border); cursor: pointer; border-radius: 2px; }
    .btn-danger:hover { border-color: var(--red); }
    .err-msg { font-family: var(--mono); font-size: 10px; color: var(--red); margin-top: 6px; min-height: 14px; }
    .theme-toggle {
      display: flex; align-items: center;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 3px; overflow: hidden; margin-left: auto; flex-shrink: 0;
    }
    .theme-btn {
      padding: 5px 9px; font-family: var(--mono); font-size: 9px; letter-spacing: .05em;
      background: transparent; border: none; color: var(--text-muted); cursor: pointer;
      transition: background .15s, color .15s; line-height: 1;
    }
    .theme-btn.active { background: var(--accent); color: #fff; }
    .theme-btn:not(.active):hover { color: var(--text); background: var(--surface3); }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-mark"><svg viewBox="0 0 16 16"><path d="M2 2h5v2H4v8h8v-3h2v5H2V2zm6 0h6v6h-2V5.414l-5.293 5.293-1.414-1.414L12.586 4H8V2z"/></svg></div>
    <span>BASKET</span>
  </a>
  <nav>
    <a class="nav-link" href="/">Receipts</a>
    <a class="nav-link" href="/history">History</a>
    <a class="nav-link" href="/prices">Prices</a>
    <a class="nav-link" href="/meals">Meal Plan</a>
    <a class="nav-link" href="/analytics">Insights</a>
    <a class="nav-link" href="/household">Household</a>
    <a class="nav-link active" href="/spend-groups">Spend</a>
  </nav>
  <div id="user-nav" style="display:flex;align-items:center;margin-left:16px;"></div>
  <div class="theme-toggle">
    <button class="theme-btn" data-t="dark"  onclick="setTheme('dark')">DARK</button>
    <button class="theme-btn" data-t="light" onclick="setTheme('light')">LIGHT</button>
    <button class="theme-btn" data-t="hc"    onclick="setTheme('hc')">HC</button>
  </div>
</header>

<div class="workspace">

  <!-- ── Sidebar ── -->
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">Spending Groups</div>
      <button class="btn-new-group" onclick="showCreateModal()">+ New Group</button>
    </div>
    <div class="sidebar-body" id="group-list">
      <div style="padding:24px 14px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text-muted)">Loading…</div>
    </div>
  </div>

  <!-- ── Main panel ── -->
  <div class="main-panel" id="main-panel">
    <div class="empty-state">
      <div class="empty-inner">
        Create or select a spending group<br>to track shared expenses and balances
      </div>
    </div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let groups      = [];
let currentGroup = null;
let currentTab  = 'balance';
let meId        = null;

const PALETTE = [
  '#f97316','#6366f1','#a78bfa','#2dd4bf','#22c55e',
  '#eab308','#ef4444','#ec4899','#0ea5e9','#64748b',
];
let selectedColor = PALETTE[0];

// ── Boot ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const me = await fetch('/auth/me').then(r => r.json());
    meId = me.id;
  } catch(e) {}
  await loadGroups();
  const hash = parseInt(location.hash.slice(1));
  if (hash) openGroup(hash);
});

async function loadGroups() {
  try {
    groups = await fetch('/api/spend-groups').then(r => r.json());
    renderGroupList();
  } catch(e) {
    ge('group-list').innerHTML = `<div style="padding:14px;font-family:var(--mono);font-size:10px;color:var(--red)">Failed to load groups</div>`;
  }
}

function renderGroupList() {
  const list = ge('group-list');
  if (!groups.length) {
    list.innerHTML = `<div style="padding:24px 14px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text-muted);line-height:2">No spending groups yet.<br>Create one to start tracking.</div>`;
    return;
  }
  list.innerHTML = groups.map(g => `
    <div class="group-card ${currentGroup?.id === g.id ? 'active' : ''}" id="gcard-${g.id}" onclick="openGroup(${g.id})">
      <div class="group-dot" style="background:${g.color}"></div>
      <div class="group-info">
        <div class="group-name">${esc(g.name)}</div>
        <div class="group-meta">${g.member_count} member${g.member_count!==1?'s':''} · ${g.my_role}</div>
      </div>
      ${g.is_personal ? `<span class="group-personal">personal</span>` : ''}
    </div>`).join('');
}

// ── Open group ────────────────────────────────────────────────────────────────
async function openGroup(id) {
  location.hash = id;
  try {
    currentGroup = await fetch(`/api/spend-groups/${id}`).then(r => r.json());
    renderGroupList();
    renderMain();
  } catch(e) {
    ge('main-panel').innerHTML = `<div class="empty-state"><div class="empty-inner" style="color:var(--red)">Failed to load group</div></div>`;
  }
}

function renderMain() {
  if (!currentGroup) return;
  const g = currentGroup;
  const isOwner = g.created_by === meId;

  ge('main-panel').innerHTML = `
    <div style="padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;gap:12px;">
      <div class="group-color-dot" style="background:${g.color}"></div>
      <span style="font-size:18px;font-weight:600;flex:1">${esc(g.name)}</span>
      ${g.is_personal ? `<span class="group-personal">personal</span>` : ''}
      ${isOwner ? `<button class="btn-edit-group" onclick="showEditModal()">Edit</button>` : ''}
      ${isOwner ? `<button class="btn-del-group" onclick="confirmDeleteGroup()">Delete</button>` : `<button class="btn-del-group" onclick="leaveGroup()">Leave</button>`}
    </div>
    <div class="tabs">
      <div class="tab ${currentTab==='balance'?'active':''}" onclick="switchTab('balance')">Balance</div>
      <div class="tab ${currentTab==='members'?'active':''}" onclick="switchTab('members')">Members</div>
    </div>
    <div class="panel-body" id="tab-body">
      ${currentTab === 'balance' ? '' : ''}
    </div>`;

  renderTab();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase() === tab));
  renderTab();
}

async function renderTab() {
  const body = ge('tab-body');
  if (!body) return;
  if (currentTab === 'balance') {
    body.innerHTML = `<div style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">Loading balance…</div>`;
    try {
      const bal = await fetch(`/api/spend-groups/${currentGroup.id}/balance`).then(r => r.json());
      renderBalance(bal);
    } catch(e) {
      body.innerHTML = `<div style="color:var(--red);font-family:var(--mono);font-size:11px">Failed to load balance</div>`;
    }
  } else {
    renderMembers();
  }
}

function renderBalance(bal) {
  const body = ge('tab-body');
  const maxPaid = Math.max(...bal.members.map(m => m.paid), 0.01);

  body.innerHTML = `
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">Total Tagged</div>
        <div class="stat-val accent">R ${fmt(bal.total_tagged)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fair Share Each</div>
        <div class="stat-val">R ${fmt(bal.fair_share)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Members</div>
        <div class="stat-val">${bal.members.length}</div>
      </div>
    </div>

    <div class="section-title">Who paid what</div>
    <table class="balance-table">
      <thead>
        <tr><th>Member</th><th>Paid</th><th>Balance</th></tr>
      </thead>
      <tbody>
        ${bal.members.map(m => `
          <tr>
            <td>
              <div style="font-weight:500">${esc(m.display_name || m.username)}</div>
              <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">${esc(m.username)}</div>
            </td>
            <td>
              <div style="font-family:var(--mono)">R ${fmt(m.paid)}</div>
              <div class="balance-bar-wrap"><div class="balance-bar" style="width:${Math.round(m.paid/maxPaid*100)}%;background:${currentGroup.color}"></div></div>
            </td>
            <td>
              <span class="${m.balance >= 0 ? 'pos' : 'neg'}" style="font-family:var(--mono)">
                ${m.balance >= 0 ? '+' : ''}R ${fmt(Math.abs(m.balance))}
              </span>
              <div style="font-family:var(--mono);font-size:10px;color:var(--text-muted)">${m.balance > 0.005 ? 'is owed' : m.balance < -0.005 ? 'owes' : 'settled'}</div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>

    <div class="section-title">Settlement</div>
    <div class="settlement-box">
      ${bal.settlements.length === 0
        ? `<div class="all-settled">✓ All settled up!</div>`
        : bal.settlements.map(s => `
          <div class="settlement-row">
            <span style="font-weight:500">${esc(s.from)}</span>
            <span style="color:var(--text-dim);font-size:12px">→ pays →</span>
            <span style="font-weight:500">${esc(s.to)}</span>
            <span class="settlement-amt">R ${fmt(s.amount)}</span>
          </div>`).join('')}
    </div>

    <div style="font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-top:8px">
      Amounts reflect line items tagged to this group in History. Equal split assumed.
      <a href="/history" style="color:var(--accent)">Tag receipts →</a>
    </div>`;
}

function renderMembers() {
  const body  = ge('tab-body');
  const g     = currentGroup;
  const isOwner = g.created_by === meId;

  body.innerHTML = `
    <div class="section-title">Members (${g.members.length})</div>
    <div id="members-list">
      ${g.members.map(m => `
        <div class="member-row" id="mrow-${m.user_id}">
          <div class="member-avatar">${esc((m.display_name || m.username).charAt(0).toUpperCase())}</div>
          <div style="flex:1">
            <div class="member-name">${esc(m.display_name || m.username)}</div>
            <div class="member-sub">@${esc(m.username)}</div>
          </div>
          ${m.is_owner ? `<span class="owner-badge">owner</span>` : isOwner ? `
            <button class="btn-remove-member" onclick="removeMember(${m.user_id}, '${esc(m.username)}')">Remove</button>` : ''}
        </div>`).join('')}
    </div>
    ${isOwner ? `
    <div class="add-member-form">
      <input class="add-member-input" id="add-member-input" type="text" placeholder="Username to add…" autocomplete="off"
        onkeydown="if(event.key==='Enter')addMember()">
      <button class="btn-add-member" onclick="addMember()">Add</button>
    </div>
    <div class="err-msg" id="add-member-err"></div>` : ''}`;
}

async function addMember() {
  const input = ge('add-member-input');
  const errEl = ge('add-member-err');
  const username = (input?.value || '').trim();
  if (!username) return;
  errEl.textContent = '';

  try {
    const r = await fetch(`/api/spend-groups/${currentGroup.id}/members`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username}),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.statusText);
    if (input) input.value = '';
    currentGroup = await fetch(`/api/spend-groups/${currentGroup.id}`).then(r => r.json());
    renderMembers();
  } catch(e) {
    if (errEl) errEl.textContent = e.message;
  }
}

async function removeMember(uid, username) {
  if (!confirm(`Remove ${username} from this group?`)) return;
  try {
    const r = await fetch(`/api/spend-groups/${currentGroup.id}/members/${uid}`, {method: 'DELETE'});
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    currentGroup = await fetch(`/api/spend-groups/${currentGroup.id}`).then(r => r.json());
    renderMembers();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function leaveGroup() {
  if (!confirm(`Leave "${currentGroup.name}"? You'll lose access to this group's history.`)) return;
  try {
    const r = await fetch(`/api/spend-groups/${currentGroup.id}/members/${meId}`, {method: 'DELETE'});
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    currentGroup = null;
    await loadGroups();
    ge('main-panel').innerHTML = `<div class="empty-state"><div class="empty-inner">Left the group. Select another.</div></div>`;
    location.hash = '';
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

// ── Create / Edit modal ──────────────────────────────────────────────────────
function showCreateModal() {
  selectedColor = PALETTE[0];
  showGroupModal(null);
}
function showEditModal() {
  selectedColor = currentGroup.color;
  showGroupModal(currentGroup);
}

function showGroupModal(group) {
  const isEdit = !!group;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'group-modal';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">${isEdit ? 'Edit Group' : 'New Spending Group'}</div>
      <div class="field">
        <label>Name</label>
        <input type="text" id="mg-name" value="${isEdit ? esc(group.name) : ''}" placeholder="e.g. Household, Girls' Trip…" autocomplete="off">
      </div>
      <div class="field">
        <label>Colour</label>
        <div class="color-swatches" id="mg-swatches">
          ${PALETTE.map(c => `<div class="swatch ${c===selectedColor?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor('${c}')"></div>`).join('')}
        </div>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="mg-personal" ${isEdit && group.is_personal ? 'checked' : ''}>
        <label class="toggle-label" for="mg-personal">Personal (no settlement with others)</label>
      </div>
      <div class="err-msg" id="mg-err"></div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="ge('group-modal').remove()">Cancel</button>
        <button class="btn-primary" onclick="saveGroup(${isEdit ? group.id : 'null'})">${isEdit ? 'Save' : 'Create'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  ge('mg-name').focus();
}

function selectColor(c) {
  selectedColor = c;
  ge('mg-swatches').querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === c);
  });
}

async function saveGroup(id) {
  const name       = (ge('mg-name')?.value || '').trim();
  const is_personal = ge('mg-personal')?.checked || false;
  const errEl      = ge('mg-err');
  if (!name) { errEl.textContent = 'Name is required'; return; }

  try {
    const url    = id ? `/api/spend-groups/${id}` : '/api/spend-groups';
    const method = id ? 'PATCH' : 'POST';
    const r = await fetch(url, {
      method,
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, color: selectedColor, is_personal}),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.statusText);
    ge('group-modal')?.remove();
    await loadGroups();
    if (id) {
      currentGroup = await fetch(`/api/spend-groups/${id}`).then(r => r.json());
      renderMain();
    } else {
      openGroup(d.id);
    }
  } catch(e) {
    if (errEl) errEl.textContent = e.message;
  }
}

// ── Delete group ──────────────────────────────────────────────────────────────
function confirmDeleteGroup() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'del-modal';
  overlay.innerHTML = `
    <div class="modal-box" style="text-align:center">
      <div class="modal-title">Delete "${esc(currentGroup.name)}"?</div>
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:18px;line-height:1.6">
        This will delete the group and all its tags. Receipts are not deleted.
      </p>
      <div class="modal-actions" style="justify-content:center">
        <button class="btn-danger" onclick="doDeleteGroup()">Delete</button>
        <button class="btn-secondary" onclick="ge('del-modal').remove()">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function doDeleteGroup() {
  ge('del-modal')?.remove();
  try {
    const r = await fetch(`/api/spend-groups/${currentGroup.id}`, {method: 'DELETE'});
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    currentGroup = null;
    await loadGroups();
    ge('main-panel').innerHTML = `<div class="empty-state"><div class="empty-inner">Group deleted.<br>Create or select another.</div></div>`;
    location.hash = '';
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function ge(id)  { return document.getElementById(id); }
function esc(s)  { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(v)  { return Number(v).toFixed(2); }
</script>
<script src="/static/auth.js"></script>
<script>
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('basket-theme', t);
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.t === t);
    });
  }
  (function() {
    var t = document.documentElement.getAttribute('data-theme') || 'dark';
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
  })();
</script>
</body>
</html>
