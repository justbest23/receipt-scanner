<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basket · Insights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script>
    (function() {
      var t = localStorage.getItem('basket-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        /* ── Dark (default) ── */
    :root, [data-theme="dark"] {
      --bg:         #0d0f11;
      --surface:    #141618;
      --surface2:   #1c1f22;
      --surface3:   #22262b;
      --border:     #2a2d32;
      --border2:    #3d4249;
      --text:       #e2e4e7;
      --text-dim:   #9ca3af;
      --text-muted: #6b7280;
      --accent:     #f97316;
      --accent-dim: #7c3a10;
      --green:      #22c55e;
      --yellow:     #eab308;
      --red:        #ef4444;
      --purple:     #a78bfa;
      --purple-dim: #3b2a6e;
      --teal:       #2dd4bf;
      --teal-dim:   #134e4a;
      --blue:       #60a5fa;
      --green-dim:  #14532d;
      --mono:       'Space Mono', monospace;
      --sans:       'DM Sans', sans-serif;
    }

    /* ── Light ── */
    [data-theme="light"] {
      --bg:         #f3f4f6;
      --surface:    #ffffff;
      --surface2:   #f0f2f4;
      --surface3:   #e5e7eb;
      --border:     #d1d5db;
      --border2:    #bbc0c8;
      --text:       #111827;
      --text-dim:   #374151;
      --text-muted: #6b7280;
      --accent:     #c2550d;
      --accent-dim: #fff0e6;
      --green:      #15803d;
      --yellow:     #92700a;
      --red:        #b91c1c;
      --purple:     #6d28d9;
      --purple-dim: #ede9fe;
      --teal:       #0f766e;
      --teal-dim:   #ccfbf1;
      --blue:       #1d4ed8;
      --green-dim:  #dcfce7;
      --mono:       'Space Mono', monospace;
      --sans:       'DM Sans', sans-serif;
    }

    /* ── High contrast ── */
    [data-theme="hc"] {
      --bg:         #000000;
      --surface:    #0a0a0a;
      --surface2:   #141414;
      --surface3:   #1e1e1e;
      --border:     #6b6b6b;
      --border2:    #999999;
      --text:       #ffffff;
      --text-dim:   #e0e0e0;
      --text-muted: #b0b0b0;
      --accent:     #ffaa00;
      --accent-dim: #3a2700;
      --green:      #00e676;
      --yellow:     #ffee58;
      --red:        #ff5252;
      --purple:     #d0bcff;
      --purple-dim: #1a1030;
      --teal:       #64ffda;
      --teal-dim:   #003d33;
      --blue:       #82b1ff;
      --green-dim:  #003300;
      --mono:       'Space Mono', monospace;
      --sans:       'DM Sans', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); transition: background .2s, color .2s; }

    header {
      display: flex; align-items: center; gap: 0;
      border-bottom: 1px solid var(--border); background: var(--surface);
      height: 52px; flex-shrink: 0; padding: 0 24px;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; margin-right: 28px; text-decoration: none; color: var(--text); }
    .logo-mark { width: 26px; height: 26px; border: 1.5px solid var(--accent); display: grid; place-items: center; }
    .logo-mark svg { width: 13px; height: 13px; fill: var(--accent); }
    nav { display: flex; gap: 2px; }
    .nav-link {
      padding: 6px 14px; font-family: var(--mono); font-size: 11px; letter-spacing: .06em;
      text-transform: uppercase; text-decoration: none; color: var(--text-dim); border-radius: 2px;
      transition: color .15s, background .15s;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface);
      position: sticky; top: 0; z-index: 10;
    }
    .filter-bar input[type=text], .filter-bar input[type=date], .filter-bar select {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      font-family: var(--sans); font-size: 13px; padding: 6px 10px; border-radius: 2px;
      transition: border-color .15s;
    }
    .filter-bar input[type=text]:focus, .filter-bar input[type=date]:focus, .filter-bar select:focus {
      outline: none; border-color: var(--accent);
    }
    #search-input { width: 220px; }
    .filter-sep { color: var(--border2); font-size: 18px; }
    .filter-label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: .05em; }
    .btn-apply {
      padding: 7px 18px; background: var(--accent); color: #000;
      font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
      border: none; cursor: pointer; border-radius: 2px; transition: opacity .15s;
    }
    .btn-apply:hover { opacity: .85; }
    .btn-clear {
      padding: 7px 12px; background: transparent; color: var(--text-dim);
      font-family: var(--mono); font-size: 11px; border: 1px solid var(--border);
      cursor: pointer; border-radius: 2px;
    }
    .btn-clear:hover { border-color: var(--border2); color: var(--text); }
    .mode-indicator {
      margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--text-muted);
      border: 1px solid var(--border); padding: 3px 8px; border-radius: 2px;
    }

    /* ── Main layout ── */
    .main { padding: 24px; max-width: 1280px; margin: 0 auto; }

    /* ── Stat cards ── */
    .stat-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 140px; padding: 16px 18px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
    }
    .stat-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .stat-value { font-family: var(--mono); font-size: 22px; color: var(--text); font-weight: 700; }
    .stat-value.accent { color: var(--accent); }

    /* ── Section headers ── */
    .section { margin-bottom: 28px; }
    .section-head {
      font-family: var(--mono); font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Bar chart rows ── */
    .bar-list { display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-name {
      width: 160px; flex-shrink: 0; font-size: 13px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .bar-track { flex: 1; height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
    .bar-fill  { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s ease; }
    .bar-fill.green  { background: var(--green); }
    .bar-fill.purple { background: var(--purple); }
    .bar-fill.teal   { background: var(--teal); }
    .bar-meta { font-family: var(--mono); font-size: 11px; color: var(--text-dim); width: 180px; flex-shrink: 0; text-align: right; }

    /* ── Two column layout for item search ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Table ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th {
      font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .06em;
      color: var(--text-muted); padding: 6px 10px; text-align: left;
      border-bottom: 1px solid var(--border); font-weight: normal;
    }
    .data-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface2); }
    .mono-val { font-family: var(--mono); font-size: 12px; }
    .tag {
      display: inline-block; font-family: var(--mono); font-size: 9px; padding: 2px 6px;
      border-radius: 2px; background: var(--surface3); border: 1px solid var(--border2);
      color: var(--text-dim);
    }

    /* ── Empty / loading ── */
    .empty { padding: 48px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--text-muted); line-height: 2; }
    .loading { color: var(--yellow); }

    .surface-box { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }

    select option { background: var(--surface2); }
    .theme-toggle {
      display: flex; align-items: center;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 3px; overflow: hidden; margin-left: 12px; flex-shrink: 0;
    }
    .theme-btn {
      padding: 5px 9px; font-family: var(--mono); font-size: 9px; letter-spacing: .05em;
      background: transparent; border: none; color: var(--text-muted); cursor: pointer;
      transition: background .15s, color .15s; line-height: 1;
    }
    .theme-btn.active { background: var(--accent); color: #fff; }
    .theme-btn:not(.active):hover { color: var(--text); background: var(--surface3); }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-mark"><svg viewBox="0 0 16 16"><path d="M2 2h5v2H4v8h8v-3h2v5H2V2zm6 0h6v6h-2V5.414l-5.293 5.293-1.414-1.414L12.586 4H8V2z"/></svg></div>
    <span>BASKET</span>
  </a>
  <nav>
    <a class="nav-link" href="/">Receipts</a>
    <a class="nav-link" href="/history">History</a>
    <a class="nav-link" href="/prices">Prices</a>
    <a class="nav-link" href="/meals">Meal Plan</a>
    <a class="nav-link active" href="/analytics">Insights</a>
    <a class="nav-link" href="/household">Household</a>
    <a class="nav-link" href="/spend-groups">Spend</a>
  </nav>
  <div id="user-nav" style="display:flex;align-items:center;margin-left:16px;"></div>
</header>

<div class="filter-bar">
  <span class="filter-label">ITEM</span>
  <input type="text" id="search-input" placeholder="milk, eggs, bread…" autocomplete="off">
  <span class="filter-sep">|</span>
  <span class="filter-label">FROM</span>
  <input type="date" id="from-date">
  <span class="filter-label">TO</span>
  <input type="date" id="to-date">
  <span class="filter-sep">|</span>
  <span class="filter-label">CATEGORY</span>
  <select id="cat-select">
    <option value="">All</option>
    <option>fruit</option><option>vegetable</option><option>dairy</option>
    <option>meat</option><option>seafood</option><option>bakery</option>
    <option>pantry</option><option>frozen</option><option>beverages</option>
    <option>snacks</option><option>alcohol</option><option>household</option>
    <option>toiletries</option><option>beauty</option><option>other</option>
  </select>
  <span class="filter-sep">|</span>
  <span class="filter-label">STORE</span>
  <select id="store-select"><option value="">All</option></select>
  <button class="btn-apply" onclick="run()">Apply</button>
  <button class="btn-clear" onclick="clearFilters()">Clear</button>
  <span class="mode-indicator" id="mode-indicator">OVERVIEW</span>
</div>

<div class="main" id="main-content">
  <div class="empty loading">Loading…</div>
</div>

<script>
const ge = id => document.getElementById(id);

// ── Sort state for history table ──────────────────────────────────────────────
let historyData = [];
let sortCol = null;
let sortDir = 1;
const SORT_KEY = { date:'date', store:'store', name:'name', qty:'quantity', unit:'unit_price', total:'total_price' };

function sortHistory(col) {
  if (sortCol === col) { sortDir *= -1; } else { sortCol = col; sortDir = 1; }
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-section');
  if (!el) return;
  const data = [...historyData];
  if (sortCol) {
    const key = SORT_KEY[sortCol];
    data.sort((a, b) => {
      const av = a[key], bv = b[key];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }
  const th = (col, label) => {
    const arrow = sortCol === col ? (sortDir === 1 ? ' ▲' : ' ▼') : '';
    return `<th style="cursor:pointer;user-select:none;" onclick="sortHistory('${col}')">${label}${arrow}</th>`;
  };
  el.innerHTML = data.length === 0
    ? '<div class="empty" style="padding:24px">No history</div>'
    : `<div class="surface-box"><table class="data-table"><thead><tr>
        ${th('date','Date')}${th('store','Store')}${th('name','Item')}${th('qty','Qty')}${th('unit','Unit Price')}${th('total','Total')}
       </tr></thead><tbody>` +
      data.map(h =>
        `<tr>
          <td class="mono-val">${h.date||'—'}</td>
          <td>${esc(h.store)}</td>
          <td style="color:var(--text-dim);font-size:12px">${esc(h.name)}</td>
          <td class="mono-val">${h.quantity??1}</td>
          <td class="mono-val">${h.unit_price!=null?'R '+fmt(h.unit_price):'—'}</td>
          <td class="mono-val">${h.total_price!=null?'R '+fmt(h.total_price):'—'}</td>
        </tr>`).join('') +
      `</tbody></table></div>`;
}

function params() {
  const p = new URLSearchParams();
  const q  = ge('search-input').value.trim();
  const fd = ge('from-date').value;
  const td = ge('to-date').value;
  const ct = ge('cat-select').value;
  const st = ge('store-select').value;
  if (q)  p.set('q', q);
  if (fd) p.set('from_date', fd);
  if (td) p.set('to_date', td);
  if (ct) p.set('category', ct);
  if (st) p.set('store', st);
  return p;
}

function clearFilters() {
  ge('search-input').value = '';
  ge('from-date').value    = '';
  ge('to-date').value      = '';
  ge('cat-select').value   = '';
  ge('store-select').value = '';
  run();
}

async function run() {
  const q  = ge('search-input').value.trim();
  const fd = ge('from-date').value;
  const td = ge('to-date').value;
  const ct = ge('cat-select').value;
  const st = ge('store-select').value;

  const hasFilter = q || fd || td || ct || st;

  let label = 'OVERVIEW';
  const parts = [q ? `"${q}"` : '', ct, st, (fd||td) ? `${fd||'…'}→${td||'now'}` : ''].filter(Boolean);
  if (parts.length) label = parts.join(' · ').toUpperCase();
  ge('mode-indicator').textContent = label;
  sortCol = null; sortDir = 1; historyData = [];

  ge('main-content').innerHTML = '<div class="empty loading">Loading…</div>';

  if (hasFilter) {
    await runItemSearch();
  } else {
    await runSummary();
  }
}

// ── Item search ───────────────────────────────────────────────────────────────
async function runItemSearch() {
  const p = params();
  try {
    const d = await fetch('/analytics/items?' + p).then(r => r.json());
    renderItemSearch(d);
  } catch(e) {
    ge('main-content').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function renderItemSearch(d) {
  historyData = d.history;
  const s = d.stats;
  const maxStoreTotal = Math.max(...d.by_store.map(x => x.total), 1);

  let html = `
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">Purchases</div>
        <div class="stat-value accent">${s.count}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Spend</div>
        <div class="stat-value">R ${fmt(s.total_spend)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Unit Price</div>
        <div class="stat-value">R ${fmt(s.avg_price)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Min / Max Price</div>
        <div class="stat-value" style="font-size:16px">R ${fmt(s.min_price)} <span style="color:var(--text-muted);font-size:12px">to</span> R ${fmt(s.max_price)}</div>
      </div>
    </div>

    <div class="two-col">
      <div class="section">
        <div class="section-head">By Store</div>
        ${d.by_store.length === 0 ? '<div class="empty" style="padding:24px">No data</div>' : `
        <div class="bar-list">
          ${d.by_store.map(row => `
            <div class="bar-row">
              <div class="bar-name" title="${esc(row.store)}">${esc(row.store)}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${pct(row.total, maxStoreTotal)}%"></div></div>
              <div class="bar-meta">${row.count}× &nbsp; R ${fmt(row.total)} &nbsp; <span style="color:var(--text-muted)">avg R ${fmt(row.avg_price)}</span></div>
            </div>`).join('')}
        </div>`}
      </div>

      <div class="section">
        <div class="section-head">Purchase History <span style="color:var(--text-muted);font-size:9px;margin-left:6px">click column to sort</span></div>
        <div id="history-section"></div>
      </div>
    </div>`;

  ge('main-content').innerHTML = html;
  renderHistory();
}

// ── Summary (no filters) ──────────────────────────────────────────────────────
async function runSummary() {
  const p = params();
  p.delete('q'); p.delete('category');
  try {
    const d = await fetch('/analytics/summary?' + p).then(r => r.json());
    renderSummary(d);
  } catch(e) {
    ge('main-content').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function renderSummary(d) {
  const ov = d.overview;
  const maxCat   = Math.max(...d.by_category.map(x => x.total), 1);
  const maxStore = Math.max(...d.by_store.map(x => x.total), 1);
  const maxItem  = Math.max(...d.top_items.map(x => x.count), 1);

  const COLORS = ['', 'green', 'purple', 'teal', '', 'green', 'purple'];

  let html = `
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">Total Receipts</div>
        <div class="stat-value accent">${ov.total_receipts}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Spend</div>
        <div class="stat-value">R ${fmt(ov.total_spend)}</div>
      </div>
    </div>

    <div class="two-col">

      <div>
        <div class="section">
          <div class="section-head">Spend by Category</div>
          ${d.by_category.length === 0 ? '<div class="empty" style="padding:24px">No data yet</div>' : `
          <div class="bar-list">
            ${d.by_category.map((row, i) => `
              <div class="bar-row">
                <div class="bar-name" title="${esc(row.category)}">${esc(row.category)}</div>
                <div class="bar-track"><div class="bar-fill ${COLORS[i % COLORS.length]}" style="width:${pct(row.total, maxCat)}%"></div></div>
                <div class="bar-meta">${row.count} items &nbsp; R ${fmt(row.total)}</div>
              </div>`).join('')}
          </div>`}
        </div>

        <div class="section">
          <div class="section-head">Spend by Store</div>
          ${d.by_store.length === 0 ? '<div class="empty" style="padding:24px">No data yet</div>' : `
          <div class="bar-list">
            ${d.by_store.map((row, i) => `
              <div class="bar-row">
                <div class="bar-name" title="${esc(row.store)}">${esc(row.store)}</div>
                <div class="bar-track"><div class="bar-fill ${COLORS[(i+2) % COLORS.length]}" style="width:${pct(row.total, maxStore)}%"></div></div>
                <div class="bar-meta">${row.receipt_count} receipts &nbsp; R ${fmt(row.total)}</div>
              </div>`).join('')}
          </div>`}
        </div>
      </div>

      <div class="section">
        <div class="section-head">Most Purchased Items</div>
        ${d.top_items.length === 0 ? '<div class="empty" style="padding:24px">No data yet — scan some receipts first.</div>' : `
        <div class="surface-box">
          <table class="data-table">
            <thead><tr>
              <th>Item</th><th>Times bought</th><th>Avg Price</th><th>Total Spend</th>
            </tr></thead>
            <tbody>${d.top_items.map(item => `
              <tr>
                <td>
                  ${esc(item.name)}
                  <div style="margin-top:4px">
                    <div style="height:3px;background:var(--surface3);border-radius:2px;overflow:hidden">
                      <div style="height:100%;width:${pct(item.count, maxItem)}%;background:var(--accent);border-radius:2px"></div>
                    </div>
                  </div>
                </td>
                <td class="mono-val">${item.count}×</td>
                <td class="mono-val">${item.avg_price ? 'R ' + fmt(item.avg_price) : '—'}</td>
                <td class="mono-val">${item.total ? 'R ' + fmt(item.total) : '—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`}
      </div>

    </div>`;

  ge('main-content').innerHTML = html;
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function fmt(v)    { return v == null ? '—' : Number(v).toFixed(2); }
function pct(v, m) { return Math.round(Math.min(100, (v / m) * 100)); }
function esc(s)    { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Search on Enter ───────────────────────────────────────────────────────────
ge('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });

// ── Populate store dropdown ───────────────────────────────────────────────────
async function loadStores() {
  try {
    const d = await fetch('/analytics/stores').then(r => r.json());
    const sel = ge('store-select');
    d.stores.forEach(s => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = s;
      sel.appendChild(opt);
    });
  } catch {}
}

// ── Initial load ──────────────────────────────────────────────────────────────
loadStores();
run();
</script>

<script>
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('basket-theme', t);
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.t === t);
    });
  }
  (function() {
    var t = document.documentElement.getAttribute('data-theme') || 'dark';
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
  })();
</script>
