services:

  backend:
    build: ./backend
    container_name: receipt-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - receipt-uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://receipt:receipt@db:5432/receipts
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5vl:7b}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - UPLOAD_DIR=/app/uploads
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SESSION_DAYS=${SESSION_DAYS:-30}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: receipt-db
    environment:
      - POSTGRES_USER=receipt
      - POSTGRES_PASSWORD=receipt
      - POSTGRES_DB=receipts
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receipt -d receipts"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: receipt-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  pg-data:
  ollama-models:
  receipt-uploads:
